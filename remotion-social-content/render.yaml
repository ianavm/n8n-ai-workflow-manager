services:
  - type: web
    name: avm-social-render
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: social-content
      - key: RENDER_API_KEY
        sync: false
    healthCheckPath: /health
    autoDeploy: true
