<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{subject}}</title>
<style>
  body { margin: 0; padding: 0; background: #0A0F1C; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
  .wrapper { max-width: 560px; margin: 0 auto; padding: 40px 20px; }
  .logo { text-align: center; margin-bottom: 32px; }
  .logo-text { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: 1px; }
  .logo-dot { color: #FF6D5A; }
  .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 32px; }
  .greeting { font-size: 20px; font-weight: 700; color: #fff; margin: 0 0 8px 0; }
  .body-text { font-size: 14px; line-height: 1.7; color: #8B95A9; margin: 16px 0; }
  .body-text strong { color: #B0B8C8; }
  .cta-btn { display: inline-block; padding: 14px 32px; border-radius: 12px; text-decoration: none; font-size: 15px; font-weight: 600; color: #fff !important; background: linear-gradient(135deg, #FF6D5A, #FF8A6B); margin: 8px 0; }
  .cta-secondary { display: inline-block; font-size: 13px; color: #6C63FF; text-decoration: none; margin-top: 12px; }
  .divider { height: 1px; background: rgba(255,255,255,0.06); margin: 24px 0; }
  .feature-row { display: flex; align-items: flex-start; gap: 12px; margin: 12px 0; }
  .feature-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .feature-text { font-size: 13px; color: #B0B8C8; line-height: 1.5; }
  .feature-label { font-weight: 600; color: #fff; display: block; }
  .footer { text-align: center; padding: 24px 0 0 0; }
  .footer-text { font-size: 11px; color: #4B5563; line-height: 1.6; }
  .footer-link { color: #6B7280; text-decoration: underline; }
  .unsubscribe { font-size: 11px; color: #4B5563; text-align: center; margin-top: 16px; }
  .unsubscribe a { color: #6B7280; text-decoration: underline; }
  .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge-trial { background: rgba(108,99,255,0.15); color: #6C63FF; }
  .badge-success { background: rgba(0,212,170,0.15); color: #00D4AA; }
  @media only screen and (max-width: 600px) {
    .wrapper { padding: 20px 12px; }
    .card { padding: 24px 20px; }
    .greeting { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="wrapper">
  <!-- Logo -->
  <div class="logo">
    <span class="logo-text">AnyVision<span class="logo-dot">.</span></span>
  </div>

  <!-- Card -->
  <div class="card">
    {{content}}
  </div>

  <!-- Footer -->
  <div class="footer">
    <p class="footer-text">
      AnyVision Media &middot; AI-Powered Business Automation<br>
      <a href="https://www.anyvisionmedia.com" class="footer-link">anyvisionmedia.com</a> &middot;
      <a href="mailto:support@anyvisionmedia.com" class="footer-link">support@anyvisionmedia.com</a>
    </p>
    <p class="unsubscribe">
      <a href="{{unsubscribe_url}}">Unsubscribe</a> from onboarding emails &middot;
      <a href="https://www.anyvisionmedia.com/terms">Privacy Policy</a>
    </p>
  </div>
</div>
</body>
</html>
