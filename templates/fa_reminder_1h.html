<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meeting Starting Soon</title>
  <style>
    body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
    .container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 8px; overflow: hidden; }
    .header { background: #e65100; padding: 24px 32px; text-align: center; }
    .header h1 { color: #fff; margin: 0; font-size: 20px; }
    .body { padding: 32px; text-align: center; }
    .body p { line-height: 1.6; color: #555; margin: 0 0 16px; }
    .countdown { font-size: 48px; font-weight: 700; color: #e65100; margin: 16px 0; }
    .btn { display: inline-block; background: #6264A7; color: #fff; text-decoration: none; padding: 16px 48px; border-radius: 8px; font-weight: 700; font-size: 18px; margin: 16px 0; }
    .footer { background: #f8f9fa; padding: 20px 32px; text-align: center; font-size: 12px; color: #999; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Your Meeting Starts in 1 Hour</h1>
    </div>
    <div class="body">
      <p>Hi {{client_first_name}},</p>
      <div class="countdown">{{meeting_time}} SAST</div>
      <p>Your <strong>{{meeting_type}} meeting</strong> with {{adviser_name}} starts soon.</p>
      <a href="{{teams_url}}" class="btn">Join Teams Meeting Now</a>
      <p style="font-size: 13px; color: #888; margin-top: 24px;">Ensure your camera and microphone are working. Have your documents ready.</p>
    </div>
    <div class="footer">
      <p>{{firm_name}} | FSP {{fsp_number}}</p>
    </div>
  </div>
</body>
</html>
